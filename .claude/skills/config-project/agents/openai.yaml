interface:
  display_name: 'Config Project'
  short_description: 'Inicializar frontend/backend em monorepo turbo com parâmetros'
  default_prompt: 'Inicialize (ou continue) um TurboRepo idempotente no diretório atual usando create-turbo para reconciliar a estrutura padrão, removendo primeiro os apps padrão do Turbo (apps/docs e apps/frontend) antes de criar frontend/backend customizados. Ao criar o Next.js, use create-next-app com --src-dir.'
